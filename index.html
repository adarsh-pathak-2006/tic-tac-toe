<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Modern Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1 class="game-title">
            <i class="fas fa-gamepad"></i> Tic Tac Toe <i class="fas fa-gamepad"></i>
        </h1>
        
        <div class="status-panel">
            <div class="turn-indicator">
                <span class="turn-text">Current Turn:</span>
                <div class="turn-icon" id="turnIcon">
                    <i class="fas fa-circle"></i>
                </div>
                <span class="turn-name" id="turnName">Circle</span>
            </div>
            
            <div class="score-board">
                <div class="score-item">
                    <span class="score-icon circle"><i class="fas fa-circle"></i></span>
                    <span class="score-value" id="circleScore">0</span>
                </div>
                <div class="score-item">
                    <span class="score-icon cross"><i class="fas fa-times"></i></span>
                    <span class="score-value" id="crossScore">0</span>
                </div>
                <div class="score-item">
                    <span class="score-icon draw"><i class="fas fa-handshake"></i></span>
                    <span class="score-value" id="drawScore">0</span>
                </div>
            </div>
        </div>

        <div class="game-board">
            <div class="board-grid" id="board">
                <!-- Grid cells will be generated by JavaScript -->
            </div>
        </div>

        <div class="game-controls">
            <button class="control-btn restart" id="restartBtn">
                <i class="fas fa-redo-alt"></i> New Game
            </button>
            <button class="control-btn reset" id="resetScoreBtn">
                <i class="fas fa-sync-alt"></i> Reset Score
            </button>
        </div>

        <div class="game-message" id="gameMessage"></div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <i class="fas fa-trophy modal-icon"></i>
            <h2 id="modalMessage">Player Wins!</h2>
            <p>Congratulations!</p>
            <button class="modal-btn" id="modalCloseBtn">Play Again</button>
        </div>
    </div>

    <script src="logic.js"></script>
</body>
</html>
